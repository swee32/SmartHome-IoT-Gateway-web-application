<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register User - SmartHome</title>
    <style>
        :root {
            --bg-color: #1a4d4d;
            --primary-teal: #215151;
            --button-hover: #2c6b6b;
            --text-dark: #333;
            --error-red: #e74c3c;
            --success-green: #27ae60;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
            text-align: center;
            color: var(--text-dark);
        }

        .logo-section { margin-bottom: 25px; }
        .logo-icon {
            background: var(--primary-teal);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 22px;
            display: inline-block;
        }

        h2 { color: var(--primary-teal); margin-bottom: 10px; font-weight: 600; }
        p { font-size: 13px; color: #666; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #555; }
        
        input, select {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }

        .otp-row { display: flex; gap: 10px; }
        .otp-btn {
            background: var(--primary-teal);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 0 15px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background-color: var(--primary-teal);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn:disabled { background: #94a8a6; cursor: not-allowed; }
        .btn:hover:not(:disabled) { background-color: var(--button-hover); }

        .status-text { font-size: 11px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-section">
            <div class="logo-icon">⌂ SmartHome</div>
        </div>

        <h2>Create Account</h2>
        <p>Verify your email to link your IoT devices</p>

        <form id="registrationForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Your Name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="otp-row">
                    <input type="email" id="email" placeholder="example@gmail.com" required>
                    <button type="button" class="otp-btn" id="sendOtpBtn" onclick="requestOtp()">Get OTP</button>
                </div>
                <div id="otpStatus" class="status-text"></div>
            </div>

            <div class="form-group" id="otpGroup" style="display: none;">
                <label>Verify OTP</label>
                <div class="otp-row">
                    <input type="text" id="otpInput" placeholder="6-digit code" maxlength="6">
                    <button type="button" class="otp-btn" style="background: var(--success-green);" onclick="verifyOtp()">Verify</button>
                </div>
            </div>

            <div id="remainingFields" style="display: none;">
                <div class="form-group">
                    <label>Blynk Auth Token</label>
                    <input type="text" id="blynkToken" placeholder="Enter Token" required>
                </div>

                <div class="form-group">
                    <label>Password (8 characters)</label>
                    <input type="password" id="password" required maxlength="8" placeholder="Letter, Num, Symbol">
                </div>

                <div class="form-group">
                    <label>Home Location</label>
                    <select id="location" required>
                        <option value="Pune">Pune</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Nagpur">Nagpur</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="btn">Link & Create Account</button>
            </div>
        </form>

        <div style="margin-top: 20px; font-size: 14px;">
            Already have an account? <a href="login.html" style="color: var(--primary-teal); font-weight: 600; text-decoration: none;">Login</a>
        </div>
    </div>

    <script>
        let isVerified = false;

        async function requestOtp() {
            const email = document.getElementById('email').value;
            const status = document.getElementById('otpStatus');
            const btn = document.getElementById('sendOtpBtn');

            if (!email) return alert("Enter email first!");

            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                const res = await fetch('http://localhost:5000/api/auth/request-signup-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (res.ok) {
                    status.innerText = "OTP sent! Check your email console.";
                    status.style.color = "var(--success-green)";
                    status.style.display = "block";
                    document.getElementById('otpGroup').style.display = "block";
                } else {
                    const data = await res.json();
                    alert(data.msg);
                    btn.disabled = false;
                    btn.innerText = "Get OTP";
                }
            } catch (err) { alert("Server connection failed."); }
        }

        // Logic to "Verify" the OTP on the frontend first, then proceed
        function verifyOtp() {
            const otp = document.getElementById('otpInput').value;
            if (otp.length === 6) {
                alert("OTP format verified! You can now complete registration.");
                document.getElementById('remainingFields').style.display = "block";
                document.getElementById('otpGroup').style.display = "none";
                document.getElementById('email').readOnly = true;
                isVerified = true;
            } else {
                alert("Please enter a valid 6-digit OTP.");
            }
        }

        document.getElementById('registrationForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!isVerified) return alert("Please verify OTP first!");

            const userData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                blynkToken: document.getElementById('blynkToken').value,
                location: document.getElementById('location').value,
                otp: document.getElementById('otpInput').value 
            };

            try {
                const res = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                const data = await res.json();
                if (res.ok) {
                    alert("✅ Registration Successful!");
                    window.location.href = "login.html";
                } else {
                    alert(data.msg);
                }
            } catch (err) { alert("Registration failed."); }
        };
    </script>
</body>
</html>
