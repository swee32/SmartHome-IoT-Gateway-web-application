<div class="header-bar" style="margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;">
    <div>
        <h2 style="color: #1a4d4d; margin: 0;">Support Management</h2>
        <p style="color: #666; font-size: 14px;">Review active tickets and historical resolved issues.</p>
    </div>
    <button onclick="loadAllData()" style="background: #1a4d4d; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer;">
        <i class="fas fa-sync-alt"></i> Sync Atlas
    </button>
</div>

<div style="margin-bottom: 40px;">
    <h3 style="color: #d35400; font-size: 18px; border-left: 4px solid #d35400; padding-left: 10px; margin-bottom: 15px;">Active Tickets</h3>
    <table style="width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
        <thead>
            <tr style="text-align: left; background: #fdf2e9; color: #1a4d4d; font-size: 12px; text-transform: uppercase;">
                <th style="padding: 15px; width: 15%;">Date</th>
                <th style="padding: 15px; width: 20%;">Token</th>
                <th style="padding: 15px; width: 50%;">Complaint</th>
                <th style="padding: 15px; width: 15%;">Action</th>
            </tr>
        </thead>
        <tbody id="activeComplaintsBody">
            <tr><td colspan="4" style="text-align:center; padding:50px; color: #888;">Syncing Active Tickets...</td></tr>
        </tbody>
    </table>
</div>

<hr style="border: 0; border-top: 2px dashed #ddd; margin: 40px 0;">

<div>
    <h3 style="color: #27ae60; font-size: 18px; border-left: 4px solid #27ae60; padding-left: 10px; margin-bottom: 15px;">Resolved History</h3>
    <table style="width: 100%; border-collapse: collapse; background: #f9f9f9; border-radius: 8px; overflow: hidden;">
        <thead>
            <tr style="text-align: left; background: #eafaf1; color: #27ae60; font-size: 11px; text-transform: uppercase;">
                <th style="padding: 12px; width: 15%;">Resolved Date</th>
                <th style="padding: 12px; width: 20%;">User</th>
                <th style="padding: 12px; width: 65%;">Final Subject & Summary</th>
            </tr>
        </thead>
        <tbody id="resolvedComplaintsBody">
            <tr><td colspan="3" style="text-align:center; padding:30px; color:#999;">Syncing History...</td></tr>
        </tbody>
    </table>
</div>

<script>
    /**
     * Main data loader
     */
    async function loadAllData() {
        const token = localStorage.getItem('token');
        if (!token) {
            alert("Session expired. Please login again.");
            window.location.href = "admin-login.html";
            return;
        }

        await loadActiveTickets(token);
        await loadResolvedHistory(token);
    }

    async function loadActiveTickets(token) {
        const activeBody = document.getElementById('activeComplaintsBody');
        try {
            const res = await fetch('http://localhost:5000/api/admin/complaints', {
                headers: { 'x-auth-token': token }
            });
            const complaints = await res.json();
            
            if (res.ok) {
                if (complaints.length === 0) {
                    activeBody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:50px; color:#999;'>No pending tickets found.</td></tr>";
                    return;
                }

                activeBody.innerHTML = complaints.map(c => `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 15px; font-size: 13px;">${new Date(c.createdAt).toLocaleDateString('en-IN')}</td>
                        <td style="padding: 15px; font-family: monospace; color: #d35400; font-size: 12px;">${c.blynkToken || 'N/A'}</td>
                        <td style="padding: 15px;">
                            <strong style="color: #1a4d4d;">${c.subject}</strong><br>
                            <small style="color:#777;">From: ${c.userName}</small>
                            <p style="margin: 5px 0 0 0; font-size: 13px; color: #555;">${c.message}</p>
                        </td>
                        <td style="padding: 15px;">
                            <button onclick="handleResolve('${c._id}')" 
                                    style="background: #1a4d4d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 12px;">
                                Resolve
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        } catch (err) {
            activeBody.innerHTML = "<tr><td colspan='4' style='color:red; text-align:center;'>Fetch Error. Check Server.</td></tr>";
        }
    }

    async function loadResolvedHistory(token) {
        const historyBody = document.getElementById('resolvedComplaintsBody');
        try {
            const res = await fetch('http://localhost:5000/api/admin/resolved', {
                headers: { 'x-auth-token': token }
            });
            const history = await res.json();

            if (res.ok) {
                if (history.length === 0) {
                    historyBody.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:30px; color:#999;'>No history available yet.</td></tr>";
                    return;
                }

                historyBody.innerHTML = history.map(h => `
                    <tr style="border-bottom: 1px solid #eee; background: #fff;">
                        <td style="padding: 12px; font-size: 12px; color:#777;">${new Date(h.resolvedDate).toLocaleDateString('en-IN')}</td>
                        <td style="padding: 12px; font-size: 12px; color:#777;">${h.userName}</td>
                        <td style="padding: 12px; font-size: 12px; color:#777;">
                            <i class="fas fa-check-circle" style="color:#27ae60; margin-right:5px;"></i>
                            <strong>${h.subject}</strong> (Resolved)
                        </td>
                    </tr>
                `).join('');
            }
        } catch (err) {
            historyBody.innerHTML = "<tr><td colspan='3' style='color:red; text-align:center;'>History Fetch Error.</td></tr>";
        }
    }

    async function handleResolve(id) {
        if (!confirm("Is this issue solved? It will be moved to permanent history.")) return;
        
        try {
            const res = await fetch(`http://localhost:5000/api/admin/resolve-ticket/${id}`, {
                method: 'POST',
                headers: { 'x-auth-token': localStorage.getItem('token') }
            });

            if (res.ok) {
                await loadAllData(); 
            } else {
                alert("Could not archive ticket. Check role permissions.");
            }
        } catch (e) {
            alert("Network error.");
        }
    }

    // Trigger initial load
    loadAllData();
</script>
