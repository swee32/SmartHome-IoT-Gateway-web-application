<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartHome - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .label { color: #888; font-size: 11px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .device-box { padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #edf2f7; }
        .active-dev { background: #f0fff4; border-left: 4px solid #2ecc71; color: #276749; font-weight: bold; }
        .inactive-dev { background: #f8fafc; border-left: 4px solid #cbd5e0; color: #718096; }
    </style>
</head>
<body style="background: #f4f7f7; font-family: 'Segoe UI', sans-serif; padding: 20px;">

    <div class="summary-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="color: #1a4d4d; margin: 0;">System Overview: <span id="summary-user-name">Sweety</span></h2>
        <div id="connection-badge" style="padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: bold;">Connecting...</div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px;">
        <div class="stat-card" style="border-top: 4px solid #3498db;">
            <div class="label">Environment</div>
            <h2 id="live-temp">--°C</h2>
            <small id="live-humidity">Humidity: --%</small>
        </div>
        <div class="stat-card" style="border-top: 4px solid #e74c3c;">
            <div class="label">Safety</div>
            <h2 id="live-gas">Secure</h2>
            <small>MQ2 Sensor Active</small>
        </div>
        <div class="stat-card" style="border-top: 4px solid #1a4d4d;">
            <div class="label">System Sync</div>
            <h2 id="last-sync-time" style="font-size: 20px;">--:--</h2>
            <small id="last-date">Waiting...</small>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px;">
        <div class="stat-card">
            <h4 style="color: #1a4d4d; margin: 0 0 15px 0;">Weekly Energy History (kWh)</h4>
            <div style="height: 250px;"><canvas id="weeklyBarChart"></canvas></div>
        </div>
        <div class="stat-card">
            <h4 style="color: #1a4d4d; margin: 0 0 15px 0;">Active Devices</h4>
            <div id="active-appliance-grid" style="display: grid; gap: 10px;"></div>
        </div>
    </div>

    <script>
        let barChart;
        async function updateDashboard() {
            try {
                const res = await fetch('http://localhost:5000/api/sensors/data', {
                    headers: { 'x-auth-token': localStorage.getItem('token') }
                });
                const data = await res.json();
                
                // UI Updates
                document.getElementById('live-temp').innerText = `${data.temperature}°C`;
                document.getElementById('live-humidity').innerText = `Humidity: ${data.humidity}%`;
                document.getElementById('live-gas').innerText = data.gasStatus === "LEAKAGE!" ? "DANGER" : "Secure";
                document.getElementById('live-gas').style.color = data.gasStatus === "LEAKAGE!" ? "#e74c3c" : "#2ecc71";
                
                const dt = new Date(data.timestamp);
                document.getElementById('last-sync-time').innerText = dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                document.getElementById('last-date').innerText = dt.toLocaleDateString();

                // Device Grid
                const apps = [{n:"Light", c:data.current1}, {n:"Fan", c:data.current2}, {n:"Plug 1", c:data.current3}, {n:"Plug 2", c:data.current4}];
                document.getElementById('active-appliance-grid').innerHTML = apps.map(a => `
                    <div class="device-box ${a.c > 0.05 ? 'active-dev':'inactive-dev'}">
                        <span>${a.n}</span><span>${a.c > 0.05 ? a.c.toFixed(2)+'A':'OFF'}</span>
                    </div>`).join('');

                updateBarChart();
            } catch (e) { console.error(e); }
        }

        async function updateBarChart() {
            const res = await fetch('http://localhost:5000/api/sensors/weekly-history', {
                headers: { 'x-auth-token': localStorage.getItem('token') }
            });
            const stats = await res.json();
            const ctx = document.getElementById('weeklyBarChart').getContext('2d');
            if (barChart) barChart.destroy();
            barChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: stats.map(s => s.day),
                    datasets: [{ label: 'kWh', data: stats.map(s => s.value), backgroundColor: '#3498db', borderRadius: 5 }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
        setInterval(updateDashboard, 10000);
        updateDashboard();
    </script>
</body>
</html>
