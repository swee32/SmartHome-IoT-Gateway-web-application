<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SmartHome</title>
    <style>
        :root { --bg-color: #1a4d4d; --primary-teal: #215151; --button-hover: #2c6b6b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 100%; max-width: 400px; text-align: center; color: #333; }
        
        /* Logo Feature */
        .logo-section { margin-bottom: 25px; }
        .logo-link { text-decoration: none; display: inline-block; }
        .logo-icon { background: var(--primary-teal); color: white; padding: 10px 18px; border-radius: 8px; font-weight: bold; font-size: 22px; transition: 0.3s; }
        .logo-link:hover .logo-icon { transform: scale(1.05); background: var(--button-hover); }

        h2 { color: var(--primary-teal); margin-bottom: 10px; font-weight: 600; }
        p { font-size: 13px; color: #666; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; outline: none; }
        
        .btn { width: 100%; padding: 13px; background-color: var(--primary-teal); color: white; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background-color: var(--button-hover); }
        .footer { margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; font-size: 14px; }
        .footer a { color: var(--primary-teal); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-section">
            <a href="index.html" class="logo-link">
                <div class="logo-icon">⌂ SmartHome</div>
            </a>
        </div>
        <h2>Reset Access</h2>
        <p>Enter your Gmail and a new password to restore your IoT dashboard control.</p>
        <form id="resetForm">
            <div class="form-group">
                <label>Registered Gmail</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
            </div>
            <div class="form-group">
                <label>New Password (8 characters)</label>
                <input type="password" id="newPass" placeholder="Enter new password" required maxlength="8">
            </div>
            <button type="submit" id="resetBtn" class="btn">Update Password</button>
        </form>
        <div class="footer"><a href="login.html">← Back to Login</a></div>
    </div>

    <script>
        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            btn.disabled = true; btn.innerText = "Updating...";

            try {
                const res = await fetch('http://localhost:5000/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        newPassword: document.getElementById('newPass').value
                    })
                });
                const data = await res.json();
                alert(data.msg);
                if (res.ok) window.location.href = "login.html";
                else { btn.disabled = false; btn.innerText = "Update Password"; }
            } catch (err) { alert("Server error."); btn.disabled = false; }
        };
    </script>
</body>
</html>
