<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SmartHome System</title>
    <style>
        :root { 
            --bg-color: #1a4d4d; 
            --primary-teal: #215151; 
            --admin-accent: #163a3a; /* Deeper teal for Admin */
            --button-hover: #2c6b6b; 
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 100%; max-width: 400px; text-align: center; color: #333; }
        
        .logo-section { margin-bottom: 25px; }
        .logo-link { text-decoration: none; display: inline-block; }
        .logo-icon { background: var(--primary-teal); color: white; padding: 10px 18px; border-radius: 8px; font-weight: bold; font-size: 22px; transition: 0.3s; }
        .logo-link:hover .logo-icon { transform: scale(1.05); background: var(--button-hover); }

        h2 { color: var(--primary-teal); margin-bottom: 5px; font-weight: 600; }
        p { font-size: 13px; color: #777; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        .pass-wrapper { position: relative; }
        .toggle-pass { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 10px; color: var(--primary-teal); font-weight: bold; text-transform: uppercase; }

        .btn { width: 100%; padding: 13px; background-color: var(--admin-accent); color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover:not(:disabled) { background-color: var(--button-hover); }
        .btn:disabled { background: #94a8a6; cursor: not-allowed; }

        .footer { border-top: 1px solid #eee; margin-top: 25px; padding-top: 20px; font-size: 14px; }
        .footer a { color: var(--primary-teal); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-section">
            <a href="index.html" class="logo-link">
                <div class="logo-icon">⌂ SmartHome</div>
            </a>
        </div>
        
        <h2>Admin Portal</h2>
        <p>System Management</p>

        <form id="adminLoginForm">
            <div class="form-group">
                <input type="email" id="adminEmail" placeholder="Admin Email" required>
            </div>
            <div class="form-group">
                <div class="pass-wrapper">
                    <input type="password" id="adminPass" placeholder="Security Key" required>
                    <span class="toggle-pass" onclick="togglePass('adminPass', this)"></span>
                </div>
            </div>
            <button type="submit" id="adminLoginBtn" class="btn">Authorize Access</button>
        </form>

        <div class="footer">
            <a href="forgot-password.html" style="display: block; margin-bottom: 15px; font-size: 13px; color: #666; text-decoration: none;">
                Forgot Admin Password?
            </a>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
        </div>
    </div>

    <script>
        // Updated to match your User Login behavior
        function togglePass(id, btn) {
            const input = document.getElementById(id);
            const isPass = input.type === "password";
            input.type = isPass ? "text" : "password";
            btn.textContent = isPass ? "HIDE" : "SHOW";
        }

        document.getElementById('adminLoginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('adminLoginBtn');
            btn.disabled = true; 
            btn.innerText = "Verifying Role...";

            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPass').value;

            try {
                const res = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // --- ROLE PROTECTION START ---
                    if (data.user.role !== 'admin') {
                        alert("❌ Unauthorized. Regular residents cannot access the Admin Portal.");
                        window.location.href = "login.html"; // Send them back to the right place
                        return;
                    }
                    // --- ROLE PROTECTION END ---

                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userName', data.user.fullName);
                    localStorage.setItem('isAdmin', 'true');
                    
                    alert("✅ Admin Authorization Granted.");
                    window.location.href = "admin-dashboard.html";
                } else {
                    alert("❌ " + data.msg);
                    btn.disabled = false; btn.innerText = "Authorize Access";
                }
            } catch (err) {
                alert("❌ Server connection failed. Check your terminal.");
                btn.disabled = false; btn.innerText = "Authorize Access";
            }
        };
    </script>
</body>
</html>
