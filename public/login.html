<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartHome Energy System</title>
    <style>
        :root { --bg-color: #1a4d4d; --primary-teal: #215151; --button-hover: #2c6b6b; --border-color: #ccc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 100%; max-width: 400px; text-align: center; color: #333; }
        
        .logo-section { margin-bottom: 25px; }
        .logo-link { text-decoration: none; display: inline-block; }
        .logo-icon { background: var(--primary-teal); color: white; padding: 10px 18px; border-radius: 8px; font-weight: bold; font-size: 22px; transition: 0.3s; }
        .logo-link:hover .logo-icon { transform: scale(1.05); background: var(--button-hover); }

        h2 { color: var(--primary-teal); margin-bottom: 20px; font-weight: 600; }
        .form-group { margin-bottom: 15px; text-align: left; }
        
        /* Updated Input Style to prevent text overlap */
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        /* --- CSS FIX: Hide browser default password eye icons --- */
        input::-ms-reveal, input::-ms-clear { display: none; }
        input::-webkit-contacts-auto-fill-button, input::-webkit-credentials-auto-fill-button { display: none !important; }

        .pass-wrapper { position: relative; }
        
        /* Padding-right ensures typed text doesn't go under the toggle button */
        .pass-input { padding-right: 60px !important; }

        .toggle-pass { 
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%); 
            cursor: pointer; font-size: 11px; color: var(--primary-teal); 
            font-weight: bold; text-transform: uppercase; background: white; 
            padding-left: 5px; user-select: none;
        }

        .btn { width: 100%; padding: 13px; background-color: var(--primary-teal); color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover:not(:disabled) { background-color: var(--button-hover); }
        .btn:disabled { background: #94a8a6; cursor: not-allowed; }

        .footer { border-top: 1px solid #eee; margin-top: 25px; padding-top: 20px; font-size: 14px; }
        .footer a { color: var(--primary-teal); text-decoration: none; font-weight: 600; }
        .forgot-link { display: block; margin-bottom: 10px; font-size: 13px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-section">
            <a href="index.html" class="logo-link">
                <div class="logo-icon">⌂ SmartHome</div>
            </a>
        </div>
        <h2>User Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <div class="pass-wrapper">
                    <input type="password" id="loginPass" class="pass-input" placeholder="Password" required>
                    <span class="toggle-pass" onclick="togglePass('loginPass', this)">SHOW</span>
                </div>
            </div>
            <button type="submit" id="loginBtn" class="btn">Login to Home</button>
        </form>
        <div class="footer">
            <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
            New User? <a href="signup.html">Register User</a>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
        </div>
    </div>

    <script>
        function togglePass(id, btn) {
            const input = document.getElementById(id);
            const isPass = input.type === "password";
            input.type = isPass ? "text" : "password";
            btn.textContent = isPass ? "HIDE" : "SHOW";
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; 
            btn.innerText = "Authenticating...";

            try {
                const res = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPass').value
                    })
                });
                const data = await res.json();
                
                if (res.ok) {
                    if (data.user.role === 'admin') {
                        alert("⚠️ Admin account detected. Please use the Admin Portal for security access.");
                        window.location.href = "admin-login.html";
                        return;
                    }

                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userName', data.user.fullName);
                    localStorage.setItem('userBlynkToken', data.user.blynkToken);
                    localStorage.setItem('isAdmin', 'false');
                    
                    window.location.href = "user-dashboard.html";
                } else {
                    alert("❌ " + data.msg);
                    btn.disabled = false; 
                    btn.innerText = "Login to Home";
                }
            } catch (err) { 
                alert("Server connection error. Is your backend running?"); 
                btn.disabled = false; 
                btn.innerText = "Login to Home";
            }
        };
    </script>
</body>
</html>
